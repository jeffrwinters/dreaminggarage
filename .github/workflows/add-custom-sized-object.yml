name: Add custom sized object

on:
  push:
    paths:
      - '.github/workflows/add-custom-sized-object.yml'

permissions:
  contents: write

jobs:
  patch-dreamer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add custom object support
        shell: python
        run: |
          from pathlib import Path

          path = Path('dreamer.html')
          text = path.read_text(encoding='utf-8')

          replacements = [
            (
              "patio:[18,12,'#aaa','Patio','Property',1]};",
              "patio:[18,12,'#aaa','Patio','Property',1],custom:[10,10,'#5fa8ff','Custom Object','Custom',4]};"
            ),
            (
              "function add(t,text=''){let dd=d(t),layer=outside.has(t)?'property':'building',w=t==='sign'?Math.max(8,Math.ceil((text||'Garage Dreaming').length*.75)):dd.w,x=layer==='property'?-16:2,y=layer==='property'?-12:2;if(t==='door'||t==='window'){x=3;y=0}let o={t,x,y,w,h:dd.h,layer,text,color:dd.c};stickWall(o,true);items.push(o);sel=items.length-1;closeSheet();draw()}",
              "function add(t,text=''){let dd=d(t),layer=outside.has(t)?'property':'building',w=t==='sign'?Math.max(8,Math.ceil((text||'Garage Dreaming').length*.75)):dd.w,x=layer==='property'?-16:2,y=layer==='property'?-12:2;if(t==='door'||t==='window'){x=3;y=0}let o={t,x,y,w,h:dd.h,layer,text,color:dd.c};stickWall(o,true);items.push(o);sel=items.length-1;closeSheet();draw()}function addCustom(){let name=(document.getElementById('customName').value||'Custom Object').trim(),w=Number(document.getElementById('customW').value),h=Number(document.getElementById('customH').value),layer=document.getElementById('customLayer').value;if(!Number.isFinite(w)||!Number.isFinite(h)||w<=0||h<=0){alert('Enter a width and length greater than 0.');return}w=Math.min(500,Math.round(w*10)/10);h=Math.min(500,Math.round(h*10)/10);let o={t:'custom',name,x:layer==='property'?-16:2,y:layer==='property'?-12:2,w,h,layer,text:'',color:'#5fa8ff'};items.push(o);sel=items.length-1;closeSheet();draw()}"
            ),
            (
              "ctx.fillText(o.t==='sign'?(o.text||'Sign'):dd.n,r.x+4,r.y+14);",
              "ctx.fillText(o.t==='sign'?(o.text||'Sign'):(o.name||dd.n),r.x+4,r.y+14);"
            ),
            (
              "labelIso(dd.n,{x:(t1.x+t3.x)/2,y:(t1.y+t3.y)/2})",
              "labelIso(o.name||dd.n,{x:(t1.x+t3.x)/2,y:(t1.y+t3.y)/2})"
            ),
            (
              "name:d(o.t).n,width_ft:o.w",
              "name:o.name||d(o.t).n,width_ft:o.w"
            ),
            (
              "if(sheetMode==='add'){let cats=[...new Set(Object.keys(defs).map(k=>d(k).cat))];cats.forEach(cat=>{h+=`<div class=\"card\"><b>${cat}</b><div class=\"grid\">`;Object.keys(defs).filter(k=>d(k).cat===cat).forEach(k=>{let action=k==='sign'?'signPrompt()':`add('${k}')`;h+=`<button class=\"item\" onclick=\"${action}\">${d(k).n}<span>${d(k).w}' x ${d(k).h}'</span></button>`});h+='</div></div>'})}",
              "if(sheetMode==='add'){h+=`<div class=\"card ai-box\"><b>Custom Sized Object</b><p class=\"hint\">Add anything at its actual footprint—such as a 40' boat, trailer, machine, cabinet, or storage area.</p><label>Object name<input id=\"customName\" type=\"text\" value=\"Custom Object\" placeholder=\"40 ft Boat\"></label><div class=\"row\"><label>Width (ft)<input id=\"customW\" type=\"number\" min=\"0.1\" max=\"500\" step=\"0.1\" value=\"10\"></label><label>Length (ft)<input id=\"customH\" type=\"number\" min=\"0.1\" max=\"500\" step=\"0.1\" value=\"40\"></label></div><label>Place in<select id=\"customLayer\"><option value=\"building\">Building</option><option value=\"property\">Property / outside</option></select></label><button onclick=\"addCustom()\">Add Custom Object</button></div>`;let cats=[...new Set(Object.keys(defs).filter(k=>k!=='custom').map(k=>d(k).cat))];cats.forEach(cat=>{h+=`<div class=\"card\"><b>${cat}</b><div class=\"grid\">`;Object.keys(defs).filter(k=>k!=='custom'&&d(k).cat===cat).forEach(k=>{let action=k==='sign'?'signPrompt()':`add('${k}')`;h+=`<button class=\"item\" onclick=\"${action}\">${d(k).n}<span>${d(k).w}' x ${d(k).h}'</span></button>`});h+='</div></div>'})}"
            )
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'Expected source snippet not found: {old[:100]}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dreamer.html
          git commit -m "Add custom sized objects to Dreamer"
          git push
