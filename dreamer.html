iv></section><script>const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),S=12;let state={shopW:40,shopD:60,lotW:120,lotD:160,snap:true,dims:true,labels:true};let items=[],is3d=false,zoom=1,isoZoom=1,panX=120,panY=90,isoPanX=0,isoPanY=0,mode='',sel=-1,hov=-1,dx=0,dy=0,handle='',pinchStart=0,pinchZoom=1;const touches=new Map(),outside=new Set(['tree','bush','bed','firepit','grill','driveway','parking','patio']);const defs={car:[8,16,'#5fa8ff','Car','Vehicles',3],truck:[8,20,'#4dd4ac','Truck','Vehicles',4],motorcycle:[3,8,'#5fa8ff','Motorcycle','Vehicles',2],sxs:[6,10,'#5fa8ff','Side by Side','Vehicles',3],wakeboat:[10,30,'#5fa8ff','Wake Boat','Vehicles',4],bassboat:[9,22,'#5fa8ff','Bass Boat','Vehicles',3],lift:[12,22,'#ff7b72','2 Post Lift','Shop',5],bench:[3,8,'#ff7b72','Workbench','Shop',3],toolbox:[3,6,'#ff7b72','Toolbox','Shop',3],tablesaw:[8,8,'#ffcb6b','Table Saw','Woodshop',3],bandsaw:[4,4,'#ffcb6b','Band Saw','Woodshop',4],door:[14,1,'#70d878','Overhead Door','Structure',2],window:[6,1,'#70d878','Window','Structure',2],office:[12,12,'#bbb','Office','Rooms',8],bath:[8,8,'#ccc','Bathroom','Rooms',8],sim:[15,20,'#b07cff','Golf Sim','Rooms',9],bar:[8,4,'#c98a3d','Bar','Lifestyle',4],couch:[8,4,'#8a6cff','Couch','Lifestyle',3],sign:[16,4,'#111','Shop Sign','Structure',5],tree:[8,8,'#1f7a35','Tree','Landscaping',10],bush:[4,4,'#3cb371','Bush','Landscaping',3],bed:[10,4,'#ff69b4','Flower Bed','Landscaping',1],firepit:[5,5,'#ff4500','Fire Pit','Landscaping',2],grill:[3,3,'#444','BBQ Grill','Landscaping',3],driveway:[24,12,'#777','Driveway','Property',1],parking:[20,18,'#888','Parking Pad','Property',1],patio:[18,12,'#aaa','Patio','Property',1]};function fit(){cv.width=wrap.clientWidth;cv.height=wrap.clientHeight;draw()}addEventListener('resize',fit);function d(t){let v=defs[t];return{w:v[0],h:v[1],c:v[2],n:v[3],cat:v[4],z:v[5]}}function isOut(o){return o.layer==='property'||outside.has(o.t)}function sx(x){return panX+x*S*zoom}function sy(y){return panY+y*S
