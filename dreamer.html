<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'><title>Garage Dreaming - Dreamer 3.1</title><style>:root{--bg:#08111d;--p:#111f31;--p2:#0d1a2b;--a:#ff5c1b;--b:#23364f;--m:#9db0c8}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:white;font-family:Arial,sans-serif;height:100dvh;overflow:hidden}.app{height:100dvh;display:grid;grid-template-rows:auto 1fr}.top{height:52px;background:rgba(8,17,29,.97);display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--b);z-index:5}.brand{font-weight:900;letter-spacing:.5px;white-space:nowrap}.pill{background:var(--p2);border:1px solid var(--b);border-radius:999px;color:var(--m);padding:5px 9px;font-size:12px}.spacer{flex:1}.top button,.sheet button,.fab,.float button{background:var(--a);border:0;color:white;border-radius:9px;padding:10px 12px;font-weight:800}.menuBtn{font-size:22px;line-height:1;padding:8px 12px!important}.canvasWrap{position:relative;overflow:hidden;background:#91a873}canvas{display:block;width:100%;height:100%;touch-action:none}.fab{position:absolute;right:18px;bottom:22px;width:64px;height:64px;border-radius:50%;font-size:36px;box-shadow:0 10px 30px rgba(0,0,0,.35);z-index:4}.float{position:absolute;left:12px;bottom:24px;display:flex;gap:8px;z-index:4}.sheet{position:fixed;left:0;right:0;bottom:0;max-height:84dvh;background:var(--p);border-radius:18px 18px 0 0;border-top:1px solid var(--b);box-shadow:0 -15px 40px rgba(0,0,0,.45);z-index:10;transform:translateY(105%);transition:.22s ease;display:flex;flex-direction:column}.sheet.open{transform:translateY(0)}.handle{width:52px;height:5px;border-radius:9px;background:#52647a;margin:10px auto}.sheetHead{display:flex;align-items:center;justify-content:space-between;padding:0 14px 8px}.sheetTitle{font-size:20px;font-weight:800}.sheetBody{overflow:auto;padding:0 14px 18px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.itemBtn{min-height:62px;background:var(--p2)!important;border:1px solid var(--b)!important;text-align:left}.itemBtn span{display:block;color:var(--m);font-size:12px;margin-top:3px}.card{background:var(--p2);border:1px solid var(--b);border-radius:12px;padding:12px;margin:10px 0}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,select{width:100%;padding:12px;background:#08111d;color:white;border:1px solid var(--b);border-radius:10px;font-size:16px}label{color:var(--m);font-size:13px}.hint{color:var(--m);font-size:13px;line-height:1.45}.desktopPanel{display:none}@media(min-width:900px){.app{grid-template-columns:350px 1fr;grid-template-rows:auto 1fr}.top{grid-column:1/3}.desktopPanel{display:block;background:var(--p);border-right:1px solid var(--b);overflow:auto;padding:12px}.canvasWrap{grid-column:2;grid-row:2}.sheet{left:350px}.fab{bottom:26px}.float{bottom:30px}}</style></head><body><div class='app'><div class='top'><div class='brand'>GARAGE DREAMING</div><span id='status' class='pill'>40x60</span><div class='spacer'></div><button onclick='resetView()'>Reset</button><button class='menuBtn' onclick="openSheet('menu')">⋮</button></div><aside class='desktopPanel' id='desktop'></aside><main class='canvasWrap' id='wrap'><canvas id='cv'></canvas><button class='fab' onclick="openSheet('add')">+</button><div class='float'><button onclick='zoomIn()'>+</button><button onclick='zoomOut()'>−</button></div></main></div><section class='sheet' id='sheet'><div class='handle' onclick='closeSheet()'></div><div class='sheetHead'><div class='sheetTitle' id='sheetTitle'>Add</div><button onclick='closeSheet()'>Close</button></div><div class='sheetBody' id='sheetBody'></div></section><script>const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),wrap=document.getElementById('wrap'),S=12;let zoom=1,px=120,py=90,mode='',sel=-1,hov=-1,dx=0,dy=0,handle='',items=[],sheetMode='';const outside=new Set(['tree','bush','bed','firepit','grill','driveway','parking','patio']);let state={shopW:40,shopD:60,lotW:120,lotD:160,snap:true,dims:true,clear:false};const defs={car:[8,16,'#5fa8ff','Car','Vehicles'],truck:[8,20,'#4dd4ac','Truck','Vehicles'],motorcycle:[3,8,'#5fa8ff','Motorcycle','Vehicles'],sxs:[6,10,'#5fa8ff','Side by Side','Vehicles'],wakeboat:[10,30,'#5fa8ff','Wake Boat','Vehicles'],bassboat:[9,22,'#5fa8ff','Bass Boat','Vehicles'],lift:[12,22,'#ff7b72','2 Post Lift','Shop'],bench:[3,8,'#ff7b72','Workbench','Shop'],toolbox:[3,6,'#ff7b72','Toolbox','Shop'],tablesaw:[8,8,'#ffcb6b','Table Saw','Woodshop'],bandsaw:[4,4,'#ffcb6b','Band Saw','Woodshop'],router:[4,4,'#ffcb6b','Router Table','Woodshop'],lathe:[3,8,'#ffcb6b','Lathe','Woodshop'],door:[14,1,'#70d878','Overhead Door','Structure'],window:[6,1,'#70d878','Window','Structure'],office:[12,12,'#bbb','Office','Rooms'],bath:[8,8,'#ccc','Bathroom','Rooms'],stairs:[6,10,'#999','Stairs','Rooms'],sim:[15,20,'#b07cff','Golf Sim','Rooms'],bar:[8,4,'#c98a3d','Bar','Lifestyle'],couch:[8,4,'#8a6cff','Couch','Lifestyle'],sign:[16,4,'#111','Shop Sign','Structure'],tree:[8,8,'#1f7a35','Tree','Landscaping'],bush:[4,4,'#3cb371','Bush','Landscaping'],bed:[10,4,'#ff69b4','Flower Bed','Landscaping'],firepit:[5,5,'#ff4500','Fire Pit','Landscaping'],grill:[3,3,'#444','BBQ Grill','Landscaping'],driveway:[24,12,'#777','Driveway','Property'],parking:[20,18,'#888','Parking Pad','Property'],patio:[18,12,'#aaa','Patio','Property']};function fit(){cv.width=wrap.clientWidth;cv.height=wrap.clientHeight;draw()}addEventListener('resize',fit);function sx(x){return px+x*S*zoom}function sy(y){return py+y*S*zoom}function wx(x){return(x-px)/(S*zoom)}function wy(y){return(y-py)/(S*zoom)}function snap(v){return state.snap?Math.round(v):v}function d(t){let v=defs[t];return{w:v[0],h:v[1],c:v[2],n:v[3],cat:v[4]}}function isOut(it){return it.layer==='property'||outside.has(it.t)}function add(t,text){let dd=d(t),layer=outside.has(t)?'property':'building';items.push({t,x:layer==='property'?-16:2,y:layer==='property'?-12:2,w:t==='sign'?Math.max(8,Math.ceil((text||'Garage Dreaming').length*.75)):dd.w,h:dd.h,r:0,layer,text:text||''});sel=items.length-1;closeSheet();draw()}function clamp(it){if(isOut(it))return;it.w=Math.max(1,Math.min(it.w,state.shopW));it.h=Math.max(1,Math.min(it.h,state.shopD));it.x=Math.max(0,Math.min(state.shopW-it.w,it.x));it.y=Math.max(0,Math.min(state.shopD-it.h,it.y))}function rect(it){return{x:sx(it.x),y:sy(it.y),w:it.w*S*zoom,h:it.h*S*zoom}}function hit(mx,my){for(let i=items.length-1;i>=0;i--){let it=items[i];if(mx>=it.x&&mx<=it.x+it.w&&my>=it.y&&my<=it.y+it.h)return i}return-1}function handles(it){let r=rect(it),s=18;return{se:{x:r.x+r.w-s/2,y:r.y+r.h-s/2,w:s,h:s},e:{x:r.x+r.w-s/2,y:r.y+r.h/2-s/2,w:s,h:s},s:{x:r.x+r.w/2-s/2,y:r.y+r.h-s/2,w:s,h:s}}}function hitHandle(x,y,it){let hs=handles(it);for(let k in hs){let h=hs[k];if(x>=h.x&&x<=h.x+h.w&&y>=h.y&&y<=h.y+h.h)return k}return''}function ctrls(i){if(i<0)return[];let r=rect(items[i]),s=30;return[{a:'rot',t:'R',x:r.x,y:r.y-36,w:s,h:s},{a:'cpy',t:'C',x:r.x+36,y:r.y-36,w:s,h:s},{a:'del',t:'X',x:r.x+72,y:r.y-36,w:s,h:s}]}function hitCtrl(x,y){for(let c of ctrls(hov>=0?hov:sel)){if(x>=c.x&&x<=c.x+c.w&&y>=c.y&&y<=c.y+c.h)return c.a}return''}function grid(){ctx.fillStyle='#91a873';ctx.fillRect(0,0,cv.width,cv.height);ctx.setLineDash([8,6]);ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=2;ctx.strokeRect(sx(-30),sy(-30),state.lotW*S*zoom,state.lotD*S*zoom);ctx.setLineDash([]);ctx.fillStyle='rgba(255,255,255,.8)';ctx.fillText('property',sx(-30)+8,sy(-30)+18);ctx.fillStyle='#d9d9d9';ctx.fillRect(sx(0),sy(0),state.shopW*S*zoom,state.shopD*S*zoom);ctx.strokeStyle='#bbb';ctx.lineWidth=1;for(let x=0;x<=state.shopW;x++){ctx.beginPath();ctx.moveTo(sx(x),sy(0));ctx.lineTo(sx(x),sy(state.shopD));ctx.stroke()}for(let y=0;y<=state.shopD;y++){ctx.beginPath();ctx.moveTo(sx(0),sy(y));ctx.lineTo(sx(state.shopW),sy(y));ctx.stroke()}ctx.strokeStyle='#222';ctx.lineWidth=3;ctx.strokeRect(sx(0),sy(0),state.shopW*S*zoom,state.shopD*S*zoom);ctx.lineWidth=1}function work(it){if(isOut(it))return;let r=rect(it),p=2,l='work area';if(it.t==='lift'){p=4;l='lift clearance'}if(['wakeboat','bassboat'].includes(it.t)){p=6;l='trailer space'}if(it.t==='tablesaw'){p=8;l='infeed/outfeed'}ctx.save();ctx.strokeStyle='rgba(255,92,27,.85)';ctx.fillStyle='rgba(255,92,27,.1)';ctx.setLineDash([6,4]);ctx.fillRect(r.x-p*S*zoom,r.y-p*S*zoom,r.w+p*2*S*zoom,r.h+p*2*S*zoom);ctx.strokeRect(r.x-p*S*zoom,r.y-p*S*zoom,r.w+p*2*S*zoom,r.h+p*2*S*zoom);ctx.setLineDash([]);ctx.fillStyle='#823000';ctx.fillText(l,r.x,r.y-8);ctx.restore()}function shape(it){let dd=d(it.t),r=rect(it);ctx.save();ctx.translate(r.x+r.w/2,r.y+r.h/2);ctx.rotate((it.r||0)*Math.PI/180);ctx.translate(-r.w/2,-r.h/2);ctx.fillStyle=dd.c;ctx.strokeStyle='#222';if(['tree','bush','firepit'].includes(it.t)){ctx.beginPath();ctx.arc(r.w/2,r.h/2,Math.min(r.w,r.h)/2,0,7);ctx.fill();ctx.stroke()}else if(['wakeboat','bassboat'].includes(it.t)){ctx.beginPath();ctx.moveTo(r.w/2,0);ctx.lineTo(r.w,r.h*.25);ctx.lineTo(r.w*.86,r.h);ctx.lineTo(r.w*.14,r.h);ctx.lineTo(0,r.h*.25);ctx.closePath();ctx.fill();ctx.stroke()}else if(['car','truck','sxs'].includes(it.t)){ctx.fillRect(0,0,r.w,r.h);ctx.strokeRect(0,0,r.w,r.h);ctx.strokeRect(r.w*.18,r.h*.16,r.w*.64,r.h*.68)}else if(it.t==='sign'){ctx.fillRect(0,0,r.w,r.h);ctx.strokeRect(0,0,r.w,r.h);ctx.fillStyle='#fff';ctx.textAlign='center';ctx.font='bold 14px Arial';ctx.fillText(it.text||'Sign',r.w/2,r.h/2+5);ctx.textAlign='left'}else{ctx.fillRect(0,0,r.w,r.h);ctx.strokeRect(0,0,r.w,r.h)}ctx.restore();if(it.t!=='sign'){ctx.fillStyle='#000';ctx.font='12px Arial';ctx.fillText(dd.n,r.x+4,r.y+14)}if(state.dims)ctx.fillText(Math.round(it.w*10)/10+"' x "+Math.round(it.h*10)/10+"'",r.x+4,r.y+28)}function ui(i){let it=items[i],r=rect(it);if(i===sel){ctx.strokeStyle='#000';ctx.strokeRect(r.x,r.y,r.w,r.h);ctx.fillStyle='#ff5c1b';Object.values(handles(it)).forEach(h=>ctx.fillRect(h.x,h.y,h.w,h.h))}if(i===sel||i===hov){for(let c of ctrls(i)){ctx.fillStyle=c.a==='del'?'#b33':'#ff5c1b';ctx.fillRect(c.x,c.y,c.w,c.h);ctx.strokeStyle='#111';ctx.strokeRect(c.x,c.y,c.w,c.h);ctx.fillStyle='#fff';ctx.fillText(c.t,c.x+10,c.y+20)}}}function draw(){ctx.clearRect(0,0,cv.width,cv.height);grid();let used=0;items.forEach((it,i)=>{if(!isOut(it))used+=it.w*it.h;if(state.clear)work(it);shape(it);ui(i)});status.textContent=`${state.shopW}x${state.shopD} • ${Math.round(used/(state.shopW*state.shopD)*100)}%`;updateDesktop()}function down(e){let c=hitCtrl(e.offsetX,e.offsetY);if(c){if(c==='rot')rot();if(c==='cpy')cpy();if(c==='del')del();return}let mx=wx(e.offsetX),my=wy(e.offsetY);if(sel>=0){let h=hitHandle(e.offsetX,e.offsetY,items[sel]);if(h){mode='resize';handle=h;return}}sel=hit(mx,my);if(sel>=0){mode='drag';dx=mx-items[sel].x;dy=my-items[sel].y}else{mode='pan';dx=e.offsetX;dy=e.offsetY}draw()}function move(e){let mx=wx(e.offsetX),my=wy(e.offsetY);hov=hit(mx,my);if(mode==='resize'&&sel>=0){let it=items[sel],nw=mx-it.x,nh=my-it.y;if(state.snap){nw=Math.round(nw);nh=Math.round(nh)}if(handle==='e')nh=it.h;if(handle==='s')nw=it.w;it.w=Math.max(1,nw);it.h=Math.max(1,nh);clamp(it);draw();return}if(mode==='drag'&&sel>=0){let it=items[sel];it.x=snap(mx-dx);it.y=snap(my-dy);clamp(it);draw();return}if(mode==='pan'){px+=e.offsetX-dx;py+=e.offsetY-dy;dx=e.offsetX;dy=e.offsetY;draw();return}draw()}cv.addEventListener('pointerdown',down);cv.addEventListener('pointermove',move);addEventListener('pointerup',()=>mode='');cv.addEventListener('wheel',e=>{e.preventDefault();zoom+=e.deltaY<0?.1:-.1;zoom=Math.max(.4,Math.min(3,zoom));draw()},{passive:false});function rot(){if(sel<0)return;items[sel].r=((items[sel].r||0)+90)%360;draw()}function cpy(){if(sel<0)return;let n=JSON.parse(JSON.stringify(items[sel]));n.x+=2;n.y+=2;items.push(n);sel=items.length-1;draw()}function del(){if(sel<0)return;items.splice(sel,1);sel=-1;draw()}function zoomIn(){zoom=Math.min(3,zoom+.15);draw()}function zoomOut(){zoom=Math.max(.4,zoom-.15);draw()}function resetView(){zoom=1;px=innerWidth<900?90:150;py=innerWidth<900?80:90;draw()}function exportPng(){let a=document.createElement('a');a.download='garage-dreaming-layout.png';a.href=cv.toDataURL('image/png');a.click()}function saveLayout(){let name=prompt('Layout name','Dream Shop');if(!name)return;localStorage.setItem('gd3_'+name,JSON.stringify({items,state}));alert('Saved '+name)}function loadLayout(){let name=prompt('Load layout name');if(!name)return;let raw=localStorage.getItem('gd3_'+name);if(raw){let data=JSON.parse(raw);items=data.items||[];state=data.state||state;sel=-1;draw()}else alert('Not found')}function openSheet(m){sheetMode=m;sheet.classList.add('open');renderSheet()}function closeSheet(){sheet.classList.remove('open')}function renderSheet(){sheetTitle.textContent=sheetMode==='add'?'Add Item':sheetMode==='shop'?'Shop Setup':sheetMode==='menu'?'Menu':'Save / Export';let h='';if(sheetMode==='add'){let cats=[...new Set(Object.keys(defs).map(k=>d(k).cat))];cats.forEach(cat=>{h+=`<div class='card'><b>${cat}</b><div class='grid'>`;Object.keys(defs).filter(k=>d(k).cat===cat).forEach(k=>{h+=`<button class='itemBtn' onclick="${k==='sign'?'signPrompt()':'add(\''+k+'\')'}">${d(k).n}<span>${d(k).w}' x ${d(k).h}'</span></button>`});h+='</div></div>'})}else if(sheetMode==='shop'){h=`<div class='card'><b>Footprint</b><div class='grid'><button onclick='setShop(30,40)'>30x40</button><button onclick='setShop(40,40)'>40x40</button><button onclick='setShop(40,60)'>40x60</button><button onclick='setShop(50,80)'>50x80</button></div></div><div class='card'><div class='row'><label>Shop W<input id='swIn' type='number' value='${state.shopW}'></label><label>Shop D<input id='sdIn' type='number' value='${state.shopD}'></label></div><div class='row'><label>Lot W<input id='lwIn' type='number' value='${state.lotW}'></label><label>Lot D<input id='ldIn' type='number' value='${state.lotD}'></label></div><label><input id='snapIn' type='checkbox' ${state.snap?'checked':''}> Snap</label><br><label><input id='dimIn' type='checkbox' ${state.dims?'checked':''}> Dimensions</label><br><label><input id='clrIn' type='checkbox' ${state.clear?'checked':''}> Working areas</label><br><button onclick='applySetup()'>Apply</button></div>`}else if(sheetMode==='menu'){h=`<div class='card'><button onclick="openSheet('shop')">Shop Setup</button><button onclick="openSheet('save')">Save / Export</button></div>`}else h=`<div class='card'><button onclick='saveLayout()'>Save Layout</button><button onclick='loadLayout()'>Load Layout</button><button onclick='exportPng()'>Export PNG</button></div>`;sheetBody.innerHTML=h}function signPrompt(){let txt=prompt('Sign text','Garage Dreaming');if(txt)add('sign',txt)}function setShop(w,d){state.shopW=w;state.shopD=d;closeSheet();draw()}function applySetup(){state.shopW=+swIn.value||40;state.shopD=+sdIn.value||60;state.lotW=+lwIn.value||120;state.lotD=+ldIn.value||160;state.snap=snapIn.checked;state.dims=dimIn.checked;state.clear=clrIn.checked;closeSheet();draw()}function updateDesktop(){if(innerWidth<900)return;desktop.innerHTML='<h2>Garage Dreaming</h2><div class=card><button class=btn onclick="openSheet(\'add\')">Add Item</button><button class=btn onclick="openSheet(\'shop\')">Shop Setup</button><button class=btn onclick="openSheet(\'save\')">Save / Export</button></div><div class=card><b>Selected</b><div class=hint>'+(sel<0?'Nothing selected':d(items[sel].t).n)+'</div></div>'}fit();resetView();</script></body></html>
