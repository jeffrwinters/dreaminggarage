<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Garage Dreaming</title>
<style>
:root{--bg:#08111d;--panel:#111f31;--panel2:#0d1a2b;--orange:#ff5c1b;--line:#23364f;--muted:#9db0c8}*{box-sizing:border-box}body{margin:0;height:100dvh;overflow:hidden;background:var(--bg);color:#fff;font-family:Arial,sans-serif}.app{height:100dvh;display:grid;grid-template-rows:52px 1fr}.top{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#08111d;border-bottom:1px solid var(--line);position:relative;z-index:5}.brand{font-weight:900;letter-spacing:.5px}.pill{background:var(--panel2);border:1px solid var(--line);border-radius:999px;color:var(--muted);padding:5px 9px;font-size:12px}.spacer{flex:1}button{background:var(--orange);color:#fff;border:0;border-radius:9px;padding:10px 12px;font-weight:800}.active{box-shadow:0 0 0 2px #fff inset}.wrap{position:relative;overflow:hidden;background:#91a873}canvas{display:block;width:100%;height:100%;touch-action:none}.fab{position:absolute;right:18px;bottom:22px;width:64px;height:64px;border-radius:50%;font-size:36px;box-shadow:0 10px 30px #0008}.zoom{position:absolute;left:12px;bottom:24px;display:flex;gap:8px}.menu{position:absolute;right:10px;top:50px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px;display:none;z-index:20;min-width:190px}.menu.open{display:block}.menu button{display:block;width:100%;margin:4px 0;background:var(--panel2);text-align:left}.sheet{position:fixed;left:0;right:0;bottom:0;max-height:84dvh;background:var(--panel);border-radius:18px 18px 0 0;border-top:1px solid var(--line);box-shadow:0 -15px 40px #0008;z-index:10;transform:translateY(105%);transition:.22s;display:flex;flex-direction:column}.sheet.open{transform:translateY(0)}.handle{width:52px;height:5px;border-radius:9px;background:#52647a;margin:10px auto}.sheetHead{display:flex;align-items:center;justify-content:space-between;padding:0 14px 8px}.sheetTitle{font-size:20px;font-weight:800}.sheetBody{overflow:auto;padding:0 14px 18px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;margin:10px 0}.item{min-height:62px;background:var(--panel2)!important;border:1px solid var(--line)!important;text-align:left}.item span{display:block;color:var(--muted);font-size:12px;margin-top:3px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}input{width:100%;padding:12px;background:#08111d;color:#fff;border:1px solid var(--line);border-radius:10px;font-size:16px}label,.hint{color:var(--muted);font-size:13px;line-height:1.45}.side{display:none}@media(min-width:900px){.app{grid-template-columns:350px 1fr;grid-template-rows:52px 1fr}.top{grid-column:1/3}.side{display:block;background:var(--panel);border-right:1px solid var(--line);padding:12px;overflow:auto}.wrap{grid-column:2;grid-row:2}.sheet{left:350px}}
</style>
</head>
<body>
<div class="app">
  <div class="top"><b class="brand">GARAGE DREAMING</b><span id="status" class="pill"></span><button id="viewBtn" onclick="toggle3d()">3D</button><div class="spacer"></div><button onclick="resetView()">Reset</button><button id="menuBtn" onclick="toggleMenu(event)">Menu</button><div id="menu" class="menu"><button onclick="menuClose();openSheet('shop')">Shop Setup</button><button onclick="menuClose();openSheet('save')">Save / Export</button></div></div>
  <aside id="side" class="side"></aside>
  <main id="wrap" class="wrap"><canvas id="cv"></canvas><button class="fab" onclick="openSheet('add')">+</button><div class="zoom"><button onclick="zoomIn()">+</button><button onclick="zoomOut()">−</button></div></main>
</div>
<section id="sheet" class="sheet"><div class="handle" onclick="closeSheet()"></div><div class="sheetHead"><div id="sheetTitle" class="sheetTitle">Add</div><button onclick="closeSheet()">Close</button></div><div id="sheetBody" class="sheetBody"></div></section>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),S=12;
let state={shopW:40,shopD:60,lotW:120,lotD:160,labels:true,snap:true};
let items=[],is3d=false,zoom=1,isoZoom=1,panX=120,panY=90,isoPanX=0,isoPanY=0,mode='',sel=-1,hov=-1,dx=0,dy=0,handle='',pinchStart=0,pinchZoom=1;
const touches=new Map(),outside=new Set(['tree','bush','bed','firepit','grill','driveway','parking','patio']);
const defs={car:[8,16,'#5fa8ff','Car','Vehicles',3],truck:[8,20,'#4dd4ac','Truck','Vehicles',4],motorcycle:[3,8,'#5fa8ff','Motorcycle','Vehicles',2],sxs:[6,10,'#5fa8ff','Side by Side','Vehicles',3],wakeboat:[10,30,'#5fa8ff','Wake Boat','Vehicles',4],bassboat:[9,22,'#5fa8ff','Bass Boat','Vehicles',3],lift:[12,22,'#ff7b72','2 Post Lift','Shop',5],bench:[3,8,'#ff7b72','Workbench','Shop',3],toolbox:[3,6,'#ff7b72','Toolbox','Shop',3],tablesaw:[8,8,'#ffcb6b','Table Saw','Woodshop',3],bandsaw:[4,4,'#ffcb6b','Band Saw','Woodshop',4],door:[14,1,'#6b3f20','Overhead Door','Structure',2],window:[6,1,'#9fdcff','Window','Structure',2],office:[12,12,'#bbb','Office','Rooms',8],bath:[8,8,'#ccc','Bathroom','Rooms',8],sim:[15,20,'#b07cff','Golf Sim','Rooms',9],bar:[8,4,'#c98a3d','Bar','Lifestyle',4],couch:[8,4,'#8a6cff','Couch','Lifestyle',3],sign:[16,4,'#111','Shop Sign','Structure',5],tree:[8,8,'#1f7a35','Tree','Landscaping',10],bush:[4,4,'#3cb371','Bush','Landscaping',3],bed:[10,4,'#ff69b4','Flower Bed','Landscaping',1],firepit:[5,5,'#ff4500','Fire Pit','Landscaping',2],grill:[3,3,'#444','BBQ Grill','Landscaping',3],driveway:[24,12,'#777','Driveway','Property',1],parking:[20,18,'#888','Parking Pad','Property',1],patio:[18,12,'#aaa','Patio','Property',1]};
function fit(){cv.width=wrap.clientWidth;cv.height=wrap.clientHeight;draw()}addEventListener('resize',fit);
function d(t){let v=defs[t];return{w:v[0],h:v[1],c:v[2],n:v[3],cat:v[4],z:v[5]}}function isOut(o){return o.layer==='property'||outside.has(o.t)}
function sx(x){return panX+x*S*zoom}function sy(y){return panY+y*S*zoom}function wx(x){return(x-panX)/(S*zoom)}function wy(y){return(y-panY)/(S*zoom)}function snap(v){return state.snap?Math.round(v):v}
function orientForWall(o,wall){let horiz=wall==='north'||wall==='south',cx=o.x+o.w/2,cy=o.y+o.h/2;if(horiz&&o.h>o.w||!horiz&&o.w>o.h){let t=o.w;o.w=o.h;o.h=t;o.x=cx-o.w/2;o.y=cy-o.h/2}}
function stickWall(o,force=false){if(o.t!=='door'&&o.t!=='window')return;let c=[['north',Math.abs(o.y)],['south',Math.abs(state.shopD-(o.y+o.h))],['west',Math.abs(o.x)],['east',Math.abs(state.shopW-(o.x+o.w))]].sort((a,b)=>a[1]-b[1]);if(!force&&c[0][1]>4)return;let wall=c[0][0];orientForWall(o,wall);if(wall==='north')o.y=0;if(wall==='south')o.y=state.shopD-o.h;if(wall==='west')o.x=0;if(wall==='east')o.x=state.shopW-o.w;o.x=Math.max(0,Math.min(state.shopW-o.w,Math.round(o.x)));o.y=Math.max(0,Math.min(state.shopD-o.h,Math.round(o.y)))}
function add(t,text=''){let dd=d(t),layer=outside.has(t)?'property':'building',w=t==='sign'?Math.max(8,Math.ceil((text||'Garage Dreaming').length*.75)):dd.w,x=layer==='property'?-16:2,y=layer==='property'?-12:2;if(t==='door'||t==='window'){x=3;y=0}let o={t,x,y,w,h:dd.h,layer,text,color:dd.c};stickWall(o,true);items.push(o);sel=items.length-1;closeSheet();draw()}
function rect(o){return{x:sx(o.x),y:sy(o.y),w:o.w*S*zoom,h:o.h*S*zoom}}
function hit(mx,my){if(is3d)return-1;for(let i=items.length-1;i>=0;i--){let o=items[i];if(mx>=o.x&&mx<=o.x+o.w&&my>=o.y&&my<=o.y+o.h)return i}return-1}
function handles(o){let r=rect(o),s=18;return{se:{x:r.x+r.w-s/2,y:r.y+r.h-s/2,w:s,h:s},e:{x:r.x+r.w-s/2,y:r.y+r.h/2-s/2,w:s,h:s},s:{x:r.x+r.w/2-s/2,y:r.y+r.h-s/2,w:s,h:s}}}
function hitHandle(x,y,o){let hs=handles(o);for(let k in hs){let h=hs[k];if(x>=h.x&&x<=h.x+h.w&&y>=h.y&&y<=h.y+h.h)return k}return''}
function controls(i){if(i<0)return[];let r=rect(items[i]),s=30;return[{a:'rot',t:'R',x:r.x,y:r.y-36,w:s,h:s},{a:'copy',t:'C',x:r.x+36,y:r.y-36,w:s,h:s},{a:'color',t:'◐',x:r.x+72,y:r.y-36,w:s,h:s},{a:'remove',t:'X',x:r.x+108,y:r.y-36,w:s,h:s}]}
function hitCtrl(x,y){if(is3d)return'';for(let c of controls(hov>=0?hov:sel))if(x>=c.x&&x<=c.x+c.w&&y>=c.y&&y<=c.y+c.h)return c.a;return''}
function grid2d(){ctx.fillStyle='#91a873';ctx.fillRect(0,0,cv.width,cv.height);ctx.setLineDash([8,6]);ctx.strokeStyle='rgba(255,255,255,.55)';ctx.strokeRect(sx(-30),sy(-30),state.lotW*S*zoom,state.lotD*S*zoom);ctx.setLineDash([]);ctx.fillStyle='#d9d9d9';ctx.fillRect(sx(0),sy(0),state.shopW*S*zoom,state.shopD*S*zoom);ctx.strokeStyle='#bbb';for(let x=0;x<=state.shopW;x++){ctx.beginPath();ctx.moveTo(sx(x),sy(0));ctx.lineTo(sx(x),sy(state.shopD));ctx.stroke()}for(let y=0;y<=state.shopD;y++){ctx.beginPath();ctx.moveTo(sx(0),sy(y));ctx.lineTo(sx(state.shopW),sy(y));ctx.stroke()}ctx.strokeStyle='#222';ctx.lineWidth=3;ctx.strokeRect(sx(0),sy(0),state.shopW*S*zoom,state.shopD*S*zoom);ctx.lineWidth=1}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.roundRect?ctx.roundRect(x,y,w,h,r):ctx.rect(x,y,w,h)}
function drawVehicle(o,r){ctx.fillStyle=o.color||d(o.t).c;roundRect(r.x,r.y,r.w,r.h,Math.min(r.w,r.h)*.18);ctx.fill();ctx.stroke();ctx.fillStyle='rgba(255,255,255,.45)';ctx.fillRect(r.x+r.w*.23,r.y+r.h*.18,r.w*.54,r.h*.16);ctx.fillRect(r.x+r.w*.2,r.y+r.h*.66,r.w*.6,r.h*.16);if(o.t==='truck')ctx.strokeRect(r.x+r.w*.15,r.y+r.h*.55,r.w*.7,r.h*.35)}
function drawBoat(o,r){ctx.fillStyle=o.color||d(o.t).c;ctx.beginPath();if(r.w>=r.h){ctx.moveTo(r.x+r.w,r.y+r.h/2);ctx.lineTo(r.x+r.w*.72,r.y);ctx.lineTo(r.x,r.y+r.h*.15);ctx.lineTo(r.x,r.y+r.h*.85);ctx.lineTo(r.x+r.w*.72,r.y+r.h)}else{ctx.moveTo(r.x+r.w/2,r.y);ctx.lineTo(r.x+r.w,r.y+r.h*.28);ctx.lineTo(r.x+r.w*.82,r.y+r.h);ctx.lineTo(r.x+r.w*.18,r.y+r.h);ctx.lineTo(r.x,r.y+r.h*.28)}ctx.closePath();ctx.fill();ctx.stroke();ctx.strokeRect(r.x+r.w*.25,r.y+r.h*.35,r.w*.5,r.h*.25)}
function shape(o,i){let r=rect(o),dd=d(o.t);ctx.strokeStyle='#222';ctx.lineWidth=1;if(['car','truck','sxs'].includes(o.t))drawVehicle(o,r);else if(['wakeboat','bassboat'].includes(o.t))drawBoat(o,r);else if(o.t==='motorcycle'){ctx.strokeStyle='#111';ctx.lineWidth=3;ctx.beginPath();ctx.arc(r.x+r.w/2,r.y+r.h*.18,Math.min(r.w,r.h)*.28,0,7);ctx.stroke();ctx.beginPath();ctx.arc(r.x+r.w/2,r.y+r.h*.82,Math.min(r.w,r.h)*.28,0,7);ctx.stroke();ctx.fillStyle=o.color||dd.c;ctx.fillRect(r.x+r.w*.3,r.y+r.h*.28,r.w*.4,r.h*.44)}else if(['tree','bush','firepit'].includes(o.t)){ctx.fillStyle=o.color||dd.c;ctx.beginPath();ctx.arc(r.x+r.w/2,r.y+r.h/2,Math.min(r.w,r.h)/2,0,7);ctx.fill();ctx.stroke();if(o.t==='firepit'){ctx.fillStyle='#ffd166';ctx.beginPath();ctx.arc(r.x+r.w/2,r.y+r.h/2,Math.min(r.w,r.h)*.22,0,7);ctx.fill()}}else if(o.t==='tablesaw'){ctx.fillStyle=o.color||dd.c;ctx.fillRect(r.x,r.y,r.w,r.h);ctx.strokeRect(r.x,r.y,r.w,r.h);ctx.beginPath();ctx.moveTo(r.x+r.w*.5,r.y);ctx.lineTo(r.x+r.w*.5,r.y+r.h);ctx.stroke()}else{ctx.fillStyle=o.color||dd.c;ctx.fillRect(r.x,r.y,r.w,r.h);ctx.strokeRect(r.x,r.y,r.w,r.h)}if(state.labels){ctx.fillStyle='#000';ctx.font='12px Arial';ctx.fillText(o.t==='sign'?(o.text||'Sign'):dd.n,r.x+4,r.y+14);ctx.fillText(Math.round(o.w)+"' x "+Math.round(o.h)+"'",r.x+4,r.y+28)}}
function ui(i){let o=items[i],r=rect(o);if(i===sel){ctx.strokeStyle='#000';ctx.strokeRect(r.x,r.y,r.w,r.h);ctx.fillStyle='#ff5c1b';Object.values(handles(o)).forEach(h=>ctx.fillRect(h.x,h.y,h.w,h.h))}if(i===sel||i===hov)for(let c of controls(i)){ctx.fillStyle=c.a==='remove'?'#b33':'#ff5c1b';ctx.fillRect(c.x,c.y,c.w,c.h);ctx.strokeStyle='#111';ctx.strokeRect(c.x,c.y,c.w,c.h);ctx.fillStyle='#fff';ctx.fillText(c.t,c.x+8,c.y+20)}}
let isoT={s:1,ox:0,oy:0};function rawIso(x,y,z=0){return{x:(x-y)*.9,y:(x+y)*.45-z*.7}}function iso(x,y,z=0){let p=rawIso(x,y,z);return{x:p.x*isoT.s+isoT.ox+isoPanX,y:p.y*isoT.s+isoT.oy+isoPanY}}function shade(hex,a){let n=parseInt(hex.slice(1),16),r=(n>>16)+a,g=(n>>8&255)+a,b=(n&255)+a;return'#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('')}function poly(ps,f,st='#333'){ctx.beginPath();ps.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.closePath();ctx.fillStyle=f;ctx.fill();ctx.strokeStyle=st;ctx.stroke()}
function isoBounds(){let pts=[],m=30;[[-m,-m,0],[state.lotW-m,-m,0],[state.lotW-m,state.lotD-m,0],[-m,state.lotD-m,0],[0,0,12],[state.shopW,0,12],[state.shopW,state.shopD,12],[0,state.shopD,12]].forEach(p=>pts.push(rawIso(...p)));items.forEach(o=>{let z=d(o.t).z;[[o.x,o.y,0],[o.x+o.w,o.y,0],[o.x+o.w,o.y+o.h,z],[o.x,o.y+o.h,z]].forEach(p=>pts.push(rawIso(...p)))});let xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);return{minX:Math.min(...xs),maxX:Math.max(...xs),minY:Math.min(...ys),maxY:Math.max(...ys)}}
function fitIso(){let b=isoBounds(),pad=55,w=b.maxX-b.minX,h=b.maxY-b.minY,s=Math.min((cv.width-pad*2)/w,(cv.height-pad*2)/h)*isoZoom;isoT.s=Math.max(2,s);isoT.ox=(cv.width-(b.minX+b.maxX)*isoT.s)/2;isoT.oy=(cv.height-(b.minY+b.maxY)*isoT.s)/2+10}
function labelIso(t,p){if(!state.labels)return;ctx.save();ctx.font='12px Arial';let w=ctx.measureText(t).width+10;ctx.fillStyle='rgba(255,255,255,.75)';ctx.fillRect(p.x-w/2,p.y-15,w,18);ctx.fillStyle='#111';ctx.textAlign='center';ctx.fillText(t,p.x,p.y-2);ctx.restore()}
function isoBox(o){let dd=d(o.t),z=dd.z,c=o.color||dd.c,p2=iso(o.x+o.w,o.y,0),p3=iso(o.x+o.w,o.y+o.h,0),t1=iso(o.x,o.y,z),t2=iso(o.x+o.w,o.y,z),t3=iso(o.x+o.w,o.y+o.h,z),t4=iso(o.x,o.y+o.h,z),p4=iso(o.x,o.y+o.h,0);poly([p2,p3,t3,t2],shade(c,-18));poly([p3,p4,t4,t3],shade(c,-28));poly([t1,t2,t3,t4],c);labelIso(dd.n,{x:(t1.x+t3.x)/2,y:(t1.y+t3.y)/2})}
function wallFeature(o){stickWall(o,true);let col=o.t==='door'?'#6b3f20':'#9fdcff',z0=o.t==='door'?0:3,z1=o.t==='door'?7:6,eps=1.5,wall='north';if(o.y+o.h>=state.shopD-eps)wall='south';else if(o.x<=eps)wall='west';else if(o.x+o.w>=state.shopW-eps)wall='east';let ps;if(wall==='north')ps=[iso(o.x,0,z0),iso(o.x+o.w,0,z0),iso(o.x+o.w,0,z1),iso(o.x,0,z1)];else if(wall==='south')ps=[iso(o.x,state.shopD,z0),iso(o.x+o.w,state.shopD,z0),iso(o.x+o.w,state.shopD,z1),iso(o.x,state.shopD,z1)];else if(wall==='west')ps=[iso(0,o.y,z0),iso(0,o.y+o.h,z0),iso(0,o.y+o.h,z1),iso(0,o.y,z1)];else ps=[iso(state.shopW,o.y,z0),iso(state.shopW,o.y+o.h,z0),iso(state.shopW,o.y+o.h,z1),iso(state.shopW,o.y,z1)];poly(ps,col,'#222');labelIso(d(o.t).n,{x:(ps[0].x+ps[2].x)/2,y:(ps[0].y+ps[2].y)/2})}
function draw3d(){ctx.fillStyle='#91a873';ctx.fillRect(0,0,cv.width,cv.height);fitIso();let m=30;poly([iso(-m,-m),iso(state.lotW-m,-m),iso(state.lotW-m,state.lotD-m),iso(-m,state.lotD-m)],'#7f9868','#6f865a');poly([iso(0,0),iso(state.shopW,0),iso(state.shopW,state.shopD),iso(0,state.shopD)],'#dcdcdc','#555');let H=8;poly([iso(0,0,0),iso(state.shopW,0,0),iso(state.shopW,0,H),iso(0,0,H)],'rgba(235,235,235,.45)','#888');poly([iso(state.shopW,0,0),iso(state.shopW,state.shopD,0),iso(state.shopW,state.shopD,H),iso(state.shopW,0,H)],'rgba(210,210,210,.38)','#888');items.filter(o=>o.t==='door'||o.t==='window').forEach(wallFeature);items.filter(o=>o.t!=='door'&&o.t!=='window').sort((a,b)=>(a.x+a.y+d(a.t).z)-(b.x+b.y+d(b.t).z)).forEach(o=>{let dd=d(o.t);if(['tree','bush','firepit'].includes(o.t)){let p=iso(o.x+o.w/2,o.y+o.h/2,dd.z),rad=Math.max(7,o.w*isoT.s*.18);ctx.fillStyle=o.color||dd.c;ctx.beginPath();ctx.arc(p.x,p.y,rad,0,7);ctx.fill();ctx.strokeStyle='#244';ctx.stroke();labelIso(dd.n,{x:p.x,y:p.y-rad})}else isoBox(o)});ctx.fillStyle='rgba(255,255,255,.75)';ctx.fillText('3D preview - switch to 2D to edit',12,22)}
function draw(){ctx.clearRect(0,0,cv.width,cv.height);if(is3d)draw3d();else{grid2d();items.forEach((o,i)=>{shape(o,i);ui(i)})}let used=items.filter(o=>!isOut(o)).reduce((s,o)=>s+o.w*o.h,0);status.textContent=`${state.shopW}x${state.shopD} • ${Math.round(used/(state.shopW*state.shopD)*100)}% • ${is3d?'3D':'2D'}`;viewBtn.classList.toggle('active',is3d);updateDesktop()}
function pnt(e){let r=cv.getBoundingClientRect();return{ox:e.clientX-r.left,oy:e.clientY-r.top}}function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}function two(){return[...touches.values()]}
function down(e){cv.setPointerCapture&&cv.setPointerCapture(e.pointerId);let p=pnt(e);touches.set(e.pointerId,{x:p.ox,y:p.oy});if(touches.size===2){let t=two();pinchStart=dist(t[0],t[1]);pinchZoom=is3d?isoZoom:zoom;mode='pinch';return}if(is3d){mode='pan';dx=p.ox;dy=p.oy;return}let c=hitCtrl(p.ox,p.oy);if(c){if(c==='rot')rot();if(c==='copy')copyItem();if(c==='color')cycleColor();if(c==='remove')removeItem();return}let mx=wx(p.ox),my=wy(p.oy);if(sel>=0){let h=hitHandle(p.ox,p.oy,items[sel]);if(h){mode='resize';handle=h;return}}sel=hit(mx,my);if(sel>=0){mode='drag';dx=mx-items[sel].x;dy=my-items[sel].y}else{mode='pan';dx=p.ox;dy=p.oy}draw()}
function move(e){let p=pnt(e);if(touches.has(e.pointerId))touches.set(e.pointerId,{x:p.ox,y:p.oy});if(mode==='pinch'&&touches.size>=2){let t=two(),z=Math.max(.4,Math.min(8,pinchZoom*(dist(t[0],t[1])/pinchStart)));if(is3d)isoZoom=z;else zoom=Math.min(3,z);draw();return}if(mode==='pan'){if(is3d){isoPanX+=p.ox-dx;isoPanY+=p.oy-dy}else{panX+=p.ox-dx;panY+=p.oy-dy}dx=p.ox;dy=p.oy;draw();return}if(is3d)return;let mx=wx(p.ox),my=wy(p.oy);hov=hit(mx,my);if(mode==='resize'&&sel>=0){let o=items[sel],nw=mx-o.x,nh=my-o.y;if(handle==='e')nh=o.h;if(handle==='s')nw=o.w;o.w=Math.max(1,Math.round(nw));o.h=Math.max(1,Math.round(nh));if(o.t==='door'||o.t==='window')stickWall(o,true);draw();return}if(mode==='drag'&&sel>=0){let o=items[sel];o.x=snap(mx-dx);o.y=snap(my-dy);stickWall(o,false);draw();return}draw()}
function up(e){touches.delete(e.pointerId);if(touches.size<2&&mode==='pinch')mode='';if(touches.size===0)mode=''}cv.addEventListener('pointerdown',down);cv.addEventListener('pointermove',move);addEventListener('pointerup',up);addEventListener('pointercancel',up);cv.addEventListener('wheel',e=>{e.preventDefault();if(is3d)isoZoom=Math.max(.4,Math.min(8,isoZoom+(e.deltaY<0?.25:-.25)));else zoom=Math.max(.4,Math.min(3,zoom+(e.deltaY<0?.1:-.1)));draw()},{passive:false});
function rot(){if(sel<0)return;let o=items[sel],cx=o.x+o.w/2,cy=o.y+o.h/2,t=o.w;o.w=o.h;o.h=t;o.x=Math.round(cx-o.w/2);o.y=Math.round(cy-o.h/2);stickWall(o,true);draw()}
function copyItem(){if(sel<0)return;let n=JSON.parse(JSON.stringify(items[sel]));n.x+=2;n.y+=2;stickWall(n,false);items.push(n);sel=items.length-1;draw()}function removeItem(){if(sel<0)return;items.splice(sel,1);sel=-1;draw()}function cycleColor(){if(sel<0)return;let p=['#5fa8ff','#4dd4ac','#ff7b72','#ffcb6b','#b07cff','#c98a3d','#888','#111'],o=items[sel],i=p.indexOf(o.color);o.color=p[(i+1+p.length)%p.length];draw()}
function zoomIn(){if(is3d)isoZoom=Math.min(8,isoZoom+.35);else zoom=Math.min(3,zoom+.15);draw()}function zoomOut(){if(is3d)isoZoom=Math.max(.4,isoZoom-.35);else zoom=Math.max(.4,zoom-.15);draw()}function resetView(){if(is3d){isoZoom=1;isoPanX=0;isoPanY=0}else{zoom=1;panX=innerWidth<900?90:150;panY=innerWidth<900?80:90}draw()}function toggle3d(){is3d=!is3d;sel=-1;hov=-1;isoZoom=1;isoPanX=0;isoPanY=0;draw()}
function exportPng(){let a=document.createElement('a');a.download='garage-dreaming-layout.png';a.href=cv.toDataURL('image/png');a.click()}function saveLayout(){let name=prompt('Layout name','Dream Shop');if(!name)return;localStorage.setItem('gd3_'+name,JSON.stringify({items,state}));alert('Saved '+name)}function loadLayout(){let name=prompt('Load layout name');if(!name)return;let raw=localStorage.getItem('gd3_'+name);if(raw){let data=JSON.parse(raw);items=data.items||[];state=data.state||state;sel=-1;draw()}else alert('Not found')}
function menuEl(){return document.getElementById('menu')}function toggleMenu(e){if(e)e.stopPropagation();menuEl().classList.toggle('open')}function openSheet(m){menuClose();sheetMode=m;sheet.classList.add('open');renderSheet()}function closeSheet(){sheet.classList.remove('open')}function menuClose(){menuEl().classList.remove('open')}document.addEventListener('click',e=>{let m=menuEl();if(!m.contains(e.target)&&e.target.id!=='menuBtn')m.classList.remove('open')});
function renderSheet(){sheetTitle.textContent=sheetMode==='add'?'Add Item':sheetMode==='shop'?'Shop Setup':'Save / Export';let h='';if(sheetMode==='add'){let cats=[...new Set(Object.keys(defs).map(k=>d(k).cat))];cats.forEach(cat=>{h+=`<div class=card><b>${cat}</b><div class=grid>`;Object.keys(defs).filter(k=>d(k).cat===cat).forEach(k=>h+=`<button class=item onclick="${k==='sign'?'signPrompt()':'add(\''+k+'\')'}">${d(k).n}<span>${d(k).w}' x ${d(k).h}'</span></button>`);h+='</div></div>'})}else if(sheetMode==='shop'){h=`<div class=card><b>Footprint</b><div class=grid><button onclick='setShop(30,40)'>30x40</button><button onclick='setShop(40,40)'>40x40</button><button onclick='setShop(40,60)'>40x60</button><button onclick='setShop(50,80)'>50x80</button></div></div><div class=card><div class=row><label>Shop W<input id=swIn type=number value='${state.shopW}'></label><label>Shop D<input id=sdIn type=number value='${state.shopD}'></label></div><label><input id=labelsIn type=checkbox ${state.labels?'checked':''}> Labels</label><br><label><input id=snapIn type=checkbox ${state.snap?'checked':''}> Snap</label><br><button onclick='applySetup()'>Apply</button></div>`}else h=`<div class=card><button onclick='saveLayout()'>Save Layout</button><button onclick='loadLayout()'>Load Layout</button><button onclick='exportPng()'>Export PNG</button></div>`;sheetBody.innerHTML=h}
function signPrompt(){let txt=prompt('Sign text','Garage Dreaming');if(txt)add('sign',txt)}function setShop(w,d){state.shopW=w;state.shopD=d;closeSheet();draw()}function applySetup(){state.shopW=+swIn.value||40;state.shopD=+sdIn.value||60;state.labels=labelsIn.checked;state.snap=snapIn.checked;closeSheet();draw()}function updateDesktop(){if(innerWidth<900)return;side.innerHTML='<h2>Garage Dreaming</h2><div class=card><button onclick="openSheet(\'add\')">Add Item</button><button onclick="openSheet(\'shop\')">Shop Setup</button><button onclick="openSheet(\'save\')">Save / Export</button><button onclick="toggle3d()">Toggle 2D / 3D</button></div><div class=card><b>Doors & Windows</b><div class=hint>Doors and windows now default to the top wall and snap/stick to the nearest wall when dragged within 4 feet.</div></div>'}
fit();resetView();
</script>
</body></html>
