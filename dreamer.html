truck','sxs'].includes(o.t)){ctx.fillRect(0,0,r.w,r.h);ctx.strokeRect(0,0,r.w,r.h);ctx.strokeRect(r.w*.18,r.h*.16,r.w*.64,r.h*.68)}else if(o.t==='sign'){ctx.fillRect(0,0,r.w,r.h);ctx.strokeRect(0,0,r.w,r.h);ctx.fillStyle='#fff';ctx.textAlign='center';ctx.font='bold 14px Arial';ctx.fillText(o.text||'Sign',r.w/2,r.h/2+5);ctx.textAlign='left'}else{ctx.fillRect(0,0,r.w,r.h);ctx.strokeRect(0,0,r.w,r.h)}ctx.restore();ctx.fillStyle='#000';ctx.font='12px Arial';if(o.t!=='sign')ctx.fillText(dd.n,r.x+4,r.y+14);if(state.dims)ctx.fillText(Math.round(o.w*10)/10+"' x "+Math.round(o.h*10)/10+"'",r.x+4,r.y+28)}function ui(i){let o=items[i],r=rect(o);if(i===sel){ctx.strokeStyle='#000';ctx.strokeRect(r.x,r.y,r.w,r.h);ctx.fillStyle='#ff5c1b';Object.values(handles(o)).forEach(h=>ctx.fillRect(h.x,h.y,h.w,h.h))}if(i===sel||i===hov){for(let c of ctrls(i)){ctx.fillStyle=c.a==='del'?'#b33':'#ff5c1b';ctx.fillRect(c.x,c.y,c.w,c.h);ctx.strokeStyle='#111';ctx.strokeRect(c.x,c.y,c.w,c.h);ctx.fillStyle='#fff';ctx.fillText(c.t,c.x+10,c.y+20)}}}let isoT={s:1,ox:0,oy:0};function rawIso(x,y,z=0){return{x:(x-y)*.9,y:(x+y)*.45-z*.7}}function iso(x,y,z=0){let p=rawIso(x,y,z);return{x:p.x*isoT.s+isoT.ox,y:p.y*isoT.s+isoT.oy}}function poly(ps,f,st='#333'){ctx.beginPath();ps.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.closePath();ctx.fillStyle=f;ctx.fill();ctx.strokeStyle=st;ctx.stroke()}function isoBounds(){let pts=[],m=30;[[-m,-m,0],[state.lotW-m,-m,0],[state.lotW-m,state.lotD-m,0],[-m,state.lotD-m,0],[0,0,12],[state.shopW,0,12],[state.shopW,state.shopD,12],[0,state.shopD,12]].forEach(p=>pts.push(rawIso(...p)));items.forEach(o=>{let z=d(o.t).z;[[o.x,o.y,0],[o.x+o.w,o.y,0],[o.x+o.w,o.y+o.h,z],[o.x,o.y+o.h,z]].forEach(p=>pts.push(rawIso(...p)))});let xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);return{minX:Math.min(...xs),maxX:Math.max(...xs),minY:Math.min(...ys),maxY:Math.max(...ys)}}function fitIso(){let b=isoBounds(),pad=55,w=b.maxX-b.minX,h=b.maxY-b.minY,s=Math.min((cv.width-pad*2)/w,(cv.hei h,0);status.textContent=`${state.shopW}x${state.shopD} • ${Math.round(used/(state.shopW*state.shopD)*100)}% • ${is3d?'3D':'2D'}`;viewBtn.classList.toggle('active',is3d);updateDesktop()}function pnt(e){let r=cv.getBoundingClientRect();return{ox:e.clientX-r.left,oy:e.clientY-r.top}}function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}function two(){return[...touches.values()]}function down(e){cv.setPointerCapture&&cv.setPointerCapture(e.pointerId);let p=pnt(e);touches.set(e.pointerId,{x:p.ox,y:p.oy});if(touches.size===2){let t=two();pinchStart=dist(t[0],t[1]);pinchZoom=is3d?isoZoom:zoom;mode='pinch';return}if(is3d){mode='pan';dx=p.ox;dy=p.oy;return}let c=hitCtrl(p.ox,p.oy);if(c){if(c==='rot')rot();if(c==='cpy')cpy();if(c==='del')del();return}let mx=wx(p.ox),my=wy(p.oy);if(sel>=0){let h=hitHandle(p.ox,p.oy,items[sel]);if(h){mode='resize';handle=h;return}}sel=hit(mx,my);if(sel>=0){mode='drag';dx=mx-items[sel].x;dy=my-items[sel].y}else{mode='pan';dx=p.ox;dy=p.oy}draw()}function move(e){let p=pnt(e);if(touches.has(e.pointerId))touches.set(e.pointerId,{x:p.ox,y:p.oy});if(mode==='pinch'&&touches.size>=2){let t=two(),z=Math.max(.4,Math.min(8,pinchZoom*(dist(t[0],t[1])/pinchStart)));if(is3d)isoZoom=z;else zoom=Math.min(3,z);draw();return}if(mode==='pan'){if(is3d){px+=p.ox-dx;py+=p.oy-dy}else{px+=p.ox-dx;py+=p.oy-dy}dx=p.ox;dy=p.oy;draw();return}if(is3d)return;let mx=wx(p.ox),my=wy(p.oy);hov=hit(mx,my);if(mode==='resize'&&sel>=0){let o=items[sel],nw=mx-o.x,nh=my-o.y;if(state.snap){nw=Math.round(nw);nh=Math.round(nh)}if(handle==='e')nh=o.h;if(handle==='s')nw=o.w;o.w=Math.max(1,nw);o.h=Math.max(1,nh);clamp(o);draw();return}if(mode==='drag'&&sel>=0){let o=items[sel];o.x=snap(mx-dx);o.y=snap(my-dy);clamp(o);draw();return}draw()}function up(e){touches.delete(e.pointerId);if(touches.size<2&&mode==='pinch')mode='';if(touches.size===0)mode=''}cv.addEventListener('pointerdown',down);cv.addEventListener('pointermove',move);addEventListener('pointerup',up);addEventListener('pointercance
