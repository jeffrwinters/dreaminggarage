<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Garage Dreaming - Dreamer 2.1</title><style>:root{--bg:#08111d;--p:#111f31;--p2:#0d1a2b;--a:#ff5c1b;--b:#23364f;--m:#9db0c8}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:white;font-family:Arial,sans-serif;height:100vh;overflow:hidden;display:flex}#side{width:365px;background:var(--p);padding:12px;overflow:auto;border-right:1px solid var(--b)}#main{flex:1;display:flex;flex-direction:column}#top{background:var(--p2);padding:8px;border-bottom:1px solid var(--b)}#wrap{flex:1;overflow:hidden}canvas{display:block;background:#7f9868}.card{background:var(--p2);border:1px solid var(--b);border-radius:10px;padding:10px;margin:10px 0}.btn{background:var(--a);border:0;color:white;padding:9px;border-radius:8px;font-weight:bold;cursor:pointer}.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}select,input{width:100%;padding:8px;background:#08111d;color:white;border:1px solid var(--b);border-radius:6px}#info,#stats,.hint{color:var(--m);font-size:13px;line-height:1.45}label{line-height:1.8}.full{grid-column:1/-1}@media(max-width:900px){body{display:block;height:auto;overflow:auto}#side{width:auto}#main{height:70vh}}</style></head><body><aside id='side'><h2>Garage Dreaming<br><span class='hint'>Dreamer 2.1</span></h2><div class='card'><b>Shop Shell</b><select id='shopPreset' onchange='applyShopPreset()'><option value='custom'>Custom typed size</option><option value='30x40'>30 x 40</option><option value='40x40'>40 x 40</option><option value='40x60' selected>40 x 60</option><option value='50x60'>50 x 60</option><option value='50x80'>50 x 80</option><option value='60x80'>60 x 80</option></select><div class='grid'><label>Shop W<input id='shopW' type='number' value='40' oninput='shopPreset.value="custom";draw()'></label><label>Shop D<input id='shopD' type='number' value='60' oninput='shopPreset.value="custom";draw()'></label></div><div class='grid'><label>Lot W<input id='lotW' type='number' value='120' oninput='draw()'></label><label>Lot D<input id='lotD' type='number' value='160' oninput='draw()'></label></div><label><input type='checkbox' id='snap' checked> Snap to 1 ft grid</label><br><label><input type='checkbox' id='dims' checked onchange='draw()'> Show dimensions</label><br><label><input type='checkbox' id='clearances' onchange='draw()'> Show working areas</label></div><div class='card'><b>Shop Sign</b><select id='signPreset' onchange='signText.value=this.value'><option value='Garage Dreaming'>Garage Dreaming</option><option value='Toy Barn'>Toy Barn</option><option value='The Shop'>The Shop</option><option value='Man Cave'>Man Cave</option><option value='Lake Life Garage'>Lake Life Garage</option><option value='Custom'>Custom</option></select><input id='signText' value='Garage Dreaming' placeholder='Type any sign text'><button class='btn full' onclick='addSign()'>Add Sign</button></div><div class='card'><b>Vehicles</b><div class='grid'><button class='btn' onclick="add('car')">Car</button><button class='btn' onclick="add('truck')">Truck</button><button class='btn' onclick="add('motorcycle')">Motorcycle</button><button class='btn' onclick="add('sxs')">Side by Side</button><button class='btn' onclick="add('wakeboat')">Wake Boat</button><button class='btn' onclick="add('bassboat')">Bass Boat</button></div></div><div class='card'><b>Shop and Woodworking</b><div class='grid'><button class='btn' onclick="add('lift')">2 Post Lift</button><button class='btn' onclick="add('bench')">Workbench</button><button class='btn' onclick="add('toolbox')">Toolbox</button><button class='btn' onclick="add('compressor')">Compressor</button><button class='btn' onclick="add('tablesaw')">Table Saw</button><button class='btn' onclick="add('bandsaw')">Band Saw</button><button class='btn' onclick="add('router')">Router Table</button><button class='btn' onclick="add('lathe')">Lathe</button></div></div><div class='card'><b>Rooms and Structure</b><div class='grid'><button class='btn' onclick="add('door')">Overhead Door</button><button class='btn' onclick="add('window')">Window</button><button class='btn' onclick="add('office')">Office</button><button class='btn' onclick="add('bath')">Bathroom</button><button class='btn' onclick="add('stairs')">Stairs</button><button class='btn' onclick="add('sim')">Golf Sim</button><button class='btn' onclick="add('bar')">Bar</button><button class='btn' onclick="add('couch')">Couch</button></div></div><div class='card'><b>Landscaping and Property</b><div class='grid'><button class='btn' onclick="add('tree')">Tree</button><button class='btn' onclick="add('bush')">Bush</button><button class='btn' onclick="add('bed')">Flower Bed</button><button class='btn' onclick="add('firepit')">Fire Pit</button><button class='btn' onclick="add('grill')">BBQ Grill</button><button class='btn' onclick="add('driveway')">Driveway</button><button class='btn' onclick="add('parking')">Parking Pad</button><button class='btn' onclick="add('patio')">Patio</button></div></div><div class='card'><b>Inspector</b><div id='info'>Nothing selected</div><div class='hint'>Hover an item for R/C/X controls. Drag orange handles to resize. Landscaping can move outside the shop.</div></div><div class='card'><b>Stats</b><div id='stats'></div></div><div class='card'><b>Layouts</b><div class='grid'><button class='btn' onclick='saveLayout()'>Save</button><button class='btn' onclick='loadLayout()'>Load</button></div></div></aside><main id='main'><div id='top'><button class='btn' onclick='resetView()'>Reset View</button> <button class='btn' onclick='exportPng()'>Export PNG</button> <span id='status' class='hint'></span></div><div id='wrap'><canvas id='cv'></canvas></div></main><script>const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),wrap=document.getElementById('wrap'),scale=12;let zoom=1,panX=420,panY=260,sel=-1,hov=-1,mode='idle',dx=0,dy=0,handle='';const out=new Set(['tree','bush','bed','firepit','grill','driveway','parking','patio']);const defs={car:[8,16,'#5fa8ff','Car'],truck:[8,20,'#4dd4ac','Truck'],motorcycle:[3,8,'#5fa8ff','Motorcycle'],sxs:[6,10,'#5fa8ff','Side by Side'],wakeboat:[10,30,'#5fa8ff','Wake Boat'],bassboat:[9,22,'#5fa8ff','Bass Boat'],lift:[12,22,'#ff7b72','2 Post Lift'],bench:[3,8,'#ff7b72','Workbench'],toolbox:[3,6,'#ff7b72','Toolbox'],compressor:[3,3,'#ff7b72','Compressor'],tablesaw:[8,8,'#ffcb6b','Table Saw'],bandsaw:[4,4,'#ffcb6b','Band Saw'],router:[4,4,'#ffcb6b','Router Table'],lathe:[3,8,'#ffcb6b','Lathe'],door:[14,1,'#70d878','Door'],window:[6,1,'#70d878','Window'],office:[12,12,'#bbb','Office'],bath:[8,8,'#ccc','Bathroom'],stairs:[6,10,'#999','Stairs'],sim:[15,20,'#b07cff','Golf Sim'],bar:[8,4,'#c98a3d','Bar'],couch:[8,4,'#8a6cff','Couch'],tree:[8,8,'#1f7a35','Tree'],bush:[4,4,'#3cb371','Bush'],bed:[10,4,'#ff69b4','Flower Bed'],firepit:[5,5,'#ff4500','Fire Pit'],grill:[3,3,'#444','BBQ Grill'],driveway:[24,12,'#777','Driveway'],parking:[20,18,'#888','Parking Pad'],patio:[18,12,'#aaa','Patio'],sign:[16,4,'#111','Sign']};let items=[];function fit(){cv.width=wrap.clientWidth;cv.height=wrap.clientHeight;draw()}window.onresize=fit;function applyShopPreset(){let v=shopPreset.value;if(v==='custom')return;let a=v.split('x');shopW.value=a[0];shopD.value=a[1];draw()}function shop(){return[Math.max(1,+shopW.value||40),Math.max(1,+shopD.value||60)]}function isOut(it){return it.layer==='property'||out.has(it.t)}function d(t){let v=defs[t];return{w:v[0],h:v[1],c:v[2],n:v[3]}}function sx(x){return panX+x*scale*zoom}function sy(y){return panY+y*scale*zoom}function wx(x){return(x-panX)/(scale*zoom)}function wy(y){return(y-panY)/(scale*zoom)}function snapv(v){return snap.checked?Math.round(v):v}function add(t){let dd=d(t),layer=out.has(t)?'property':'building';items.push({t,x:layer==='property'?-18:2,y:layer==='property'?-14:2,w:dd.w,h:dd.h,r:0,layer,text:''});sel=items.length-1;draw()}function addSign(){let txt=(signText.value||'Garage Dreaming').trim();let dd=d('sign');items.push({t:'sign',x:2,y:2,w:Math.max(8,Math.ceil(txt.length*.8)),h:dd.h,r:0,layer:'building',text:txt});sel=items.length-1;draw()}function clamp(it){if(isOut(it))return;let a=shop(),sw=a[0],sh=a[1];it.w=Math.max(1,Math.min(it.w,sw));it.h=Math.max(1,Math.min(it.h,sh));it.x=Math.max(0,Math.min(sw-it.w,it.x));it.y=Math.max(0,Math.min(sh-it.h,it.y))}function rect(it){return{x:sx(it.x),y:sy(it.y),w:it.w*scale*zoom,h:it.h*scale*zoom}}function hit(mx,my){for(let i=items.length-1;i>=0;i--){let it=items[i];if(mx>=it.x&&mx<=it.x+it.w&&my>=it.y&&my<=it.y+it.h)return i}return-1}function handles(it){let r=rect(it),s=12;return{se:{x:r.x+r.w-s/2,y:r.y+r.h-s/2,w:s,h:s},e:{x:r.x+r.w-s/2,y:r.y+r.h/2-s/2,w:s,h:s},s:{x:r.x+r.w/2-s/2,y:r.y+r.h-s/2,w:s,h:s}}}function hitHandle(px,py,it){let hs=handles(it);for(let k in hs){let h=hs[k];if(px>=h.x&&px<=h.x+h.w&&py>=h.y&&py<=h.y+h.h)return k}return''}function ctrls(i){if(i<0)return[];let r=rect(items[i]),s=24;return[{a:'rot',t:'R',x:r.x,y:r.y-30,w:s,h:s},{a:'cpy',t:'C',x:r.x+28,y:r.y-30,w:s,h:s},{a:'rem',t:'X',x:r.x+56,y:r.y-30,w:s,h:s}]}function hitCtrl(px,py){for(let c of ctrls(hov>=0?hov:sel)){if(px>=c.x&&px<=c.x+c.w&&py>=c.y&&py<=c.y+c.h)return c.a}return''}function grid(){let a=shop(),sw=a[0],sh=a[1],lw=+lotW.value||120,ld=+lotD.value||160;ctx.fillStyle='#91a873';ctx.fillRect(0,0,cv.width,cv.height);ctx.save();ctx.setLineDash([8,6]);ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=2;ctx.strokeRect(sx(-30),sy(-30),lw*scale*zoom,ld*scale*zoom);ctx.setLineDash([]);ctx.fillStyle='rgba(255,255,255,.75)';ctx.fillText('property planning area',sx(-30)+10,sy(-30)+18);ctx.restore();ctx.fillStyle='#d9d9d9';ctx.fillRect(sx(0),sy(0),sw*scale*zoom,sh*scale*zoom);ctx.strokeStyle='#bdbdbd';for(let x=0;x<=sw;x++){ctx.beginPath();ctx.moveTo(sx(x),sy(0));ctx.lineTo(sx(x),sy(sh));ctx.stroke()}for(let y=0;y<=sh;y++){ctx.beginPath();ctx.moveTo(sx(0),sy(y));ctx.lineTo(sx(sw),sy(y));ctx.stroke()}ctx.strokeStyle='#222';ctx.lineWidth=3;ctx.strokeRect(sx(0),sy(0),sw*scale*zoom,sh*scale*zoom)}function work(it){if(isOut(it))return;let r=rect(it),pad=2,l='working area';if(it.t==='lift'){pad=4;l='lift clearance'}if(['wakeboat','bassboat'].includes(it.t)){pad=6;l='trailer space'}if(it.t==='tablesaw'){pad=8;l='infeed / outfeed'}if(it.t==='sim'){pad=0;l='golf sim room'}ctx.save();ctx.strokeStyle='rgba(255,92,27,.8)';ctx.fillStyle='rgba(255,92,27,.10)';ctx.setLineDash([6,4]);ctx.fillRect(r.x-pad*scale*zoom,r.y-pad*scale*zoom,r.w+pad*2*scale*zoom,r.h+pad*2*scale*zoom);ctx.strokeRect(r.x-pad*scale*zoom,r.y-pad*scale*zoom,r.w+pad*2*scale*zoom,r.h+pad*2*scale*zoom);ctx.setLineDash([]);ctx.fillStyle='#823000';ctx.fillText(l,r.x,r.y-8);ctx.restore()}function shape(it){let dd=d(it.t),r=rect(it);ctx.save();ctx.translate(r.x+r.w/2,r.y+r.h/2);ctx.rotate((it.r||0)*Math.PI/180);ctx.translate(-r.w/2,-r.h/2);ctx.fillStyle=dd.c;ctx.strokeStyle='#222';ctx.lineWidth=1;if(['tree','bush','firepit'].includes(it.t)){ctx.beginPath();ctx.arc(r.w/2,r.h/2,Math.min(r.w,r.h)/2,0,Math.PI*2);ctx.fill();ctx.stroke()}else if(['wakeboat','bassboat'].includes(it.t)){ctx.beginPath();ctx.moveTo(r.w/2,0);ctx.lineTo(r.w,r.h*.25);ctx.lineTo(r.w*.86,r.h);ctx.lineTo(r.w*.14,r.h);ctx.lineTo(0,r.h*.25);ctx.closePath();ctx.fill();ctx.stroke()}else if(['car','truck','sxs'].includes(it.t)){ctx.fillRect(0,0,r.w,r.h);ctx.strokeRect(0,0,r.w,r.h);ctx.strokeRect(r.w*.18,r.h*.16,r.w*.64,r.h*.68)}else if(it.t==='lift'){ctx.fillRect(0,0,r.w,r.h);ctx.strokeRect(0,0,r.w,r.h);ctx.fillStyle='#333';ctx.fillRect(r.w*.22,r.h*.08,r.w*.08,r.h*.84);ctx.fillRect(r.w*.70,r.h*.08,r.w*.08,r.h*.84)}else if(it.t==='sign'){ctx.fillRect(0,0,r.w,r.h);ctx.strokeRect(0,0,r.w,r.h);ctx.fillStyle='#fff';ctx.textAlign='center';ctx.font='bold 14px Arial';ctx.fillText(it.text||'Sign',r.w/2,r.h/2+5);ctx.textAlign='left'}else{ctx.fillRect(0,0,r.w,r.h);ctx.strokeRect(0,0,r.w,r.h)}ctx.restore();if(it.t!=='sign'){ctx.fillStyle='#000';ctx.font='12px Arial';ctx.fillText(dd.n,r.x+4,r.y+14)}if(dims.checked)ctx.fillText(Math.round(it.w*10)/10+"' x "+Math.round(it.h*10)/10+"'",r.x+4,r.y+28)}function ui(i){let it=items[i],r=rect(it);if(i===sel){ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.strokeRect(r.x,r.y,r.w,r.h);ctx.fillStyle='#ff5c1b';Object.values(handles(it)).forEach(h=>ctx.fillRect(h.x,h.y,h.w,h.h))}if(i===sel||i===hov){for(let c of ctrls(i)){ctx.fillStyle=c.a==='rem'?'#b33':'#ff5c1b';ctx.fillRect(c.x,c.y,c.w,c.h);ctx.strokeStyle='#111';ctx.strokeRect(c.x,c.y,c.w,c.h);ctx.fillStyle='#fff';ctx.fillText(c.t,c.x+8,c.y+16)}}}function draw(){ctx.clearRect(0,0,cv.width,cv.height);grid();let used=0;items.forEach((it,i)=>{if(!isOut(it))used+=it.w*it.h;if(clearances.checked)work(it);shape(it);ui(i)});let a=shop(),sw=a[0],sh=a[1];stats.innerHTML=`Shop size: ${sw} x ${sh}<br>Shop used: ${Math.round(used)} / ${sw*sh} sq ft<br>${Math.round(used/(sw*sh)*100)}% utilized<br>Outdoor items excluded`;status.textContent=`Zoom ${Math.round(zoom*100)}%`;info.textContent=sel<0?'Nothing selected':`${d(items[sel].t).n}${items[sel].t==='sign'?': '+items[sel].text:''} - ${isOut(items[sel])?'property':'building'} layer`}cv.addEventListener('wheel',e=>{e.preventDefault();zoom+=e.deltaY<0?.1:-.1;zoom=Math.max(.4,Math.min(3,zoom));draw()});cv.onmousedown=e=>{let c=hitCtrl(e.offsetX,e.offsetY);if(c){if(c==='rot')rot();if(c==='cpy')cpy();if(c==='rem')rem();return}let mx=wx(e.offsetX),my=wy(e.offsetY);if(sel>=0){let h=hitHandle(e.offsetX,e.offsetY,items[sel]);if(h){mode='resize';handle=h;return}}sel=hit(mx,my);if(sel>=0){mode='drag';dx=mx-items[sel].x;dy=my-items[sel].y}else{mode='pan';dx=e.offsetX;dy=e.offsetY}draw()};cv.onmousemove=e=>{let mx=wx(e.offsetX),my=wy(e.offsetY);hov=hit(mx,my);cv.style.cursor=sel>=0&&hitHandle(e.offsetX,e.offsetY,items[sel])?'nwse-resize':'default';if(mode==='resize'&&sel>=0){let it=items[sel],nw=mx-it.x,nh=my-it.y;if(snap.checked){nw=Math.round(nw);nh=Math.round(nh)}if(handle==='e')nh=it.h;if(handle==='s')nw=it.w;it.w=Math.max(1,nw);it.h=Math.max(1,nh);clamp(it);draw();return}if(mode==='drag'&&sel>=0){let it=items[sel];it.x=snapv(mx-dx);it.y=snapv(my-dy);clamp(it);draw();return}if(mode==='pan'){panX+=e.offsetX-dx;panY+=e.offsetY-dy;dx=e.offsetX;dy=e.offsetY;draw();return}draw()};window.onmouseup=()=>mode='idle';function rot(){if(sel<0)return;items[sel].r=((items[sel].r||0)+90)%360;draw()}function cpy(){if(sel<0)return;let n=JSON.parse(JSON.stringify(items[sel]));n.x+=2;n.y+=2;items.push(n);sel=items.length-1;draw()}function rem(){if(sel<0)return;items.splice(sel,1);sel=-1;draw()}function resetView(){zoom=1;panX=420;panY=260;draw()}function exportPng(){let a=document.createElement('a');a.download='garage-dreaming-layout.png';a.href=cv.toDataURL('image/png');a.click()}function saveLayout(){let name=prompt('Layout name','Dream Shop');if(!name)return;localStorage.setItem('gd2_'+name,JSON.stringify({items,shopW:shopW.value,shopD:shopD.value,lotW:lotW.value,lotD:lotD.value}));alert('Saved '+name)}function loadLayout(){let name=prompt('Load layout name');if(!name)return;let raw=localStorage.getItem('gd2_'+name);if(raw){let data=JSON.parse(raw);items=data.items||[];if(data.shopW)shopW.value=data.shopW;if(data.shopD)shopD.value=data.shopD;if(data.lotW)lotW.value=data.lotW;if(data.lotD)lotD.value=data.lotD;shopPreset.value='custom';sel=-1;draw()}else alert('Not found')}fit();</script></body></html>
